<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="3" dy="4" stdDeviation="2.5" flood-color="hsl(152,28%,5%)" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Single deciduous tree centered in the tile -->
  <g filter="url(#shadow)" opacity="0.055" transform="translate(120,120) scale(0.9)">
    <!-- Trunk -->
    <path d="M-4,20 L-5,55 L5,55 L4,20 Z" fill="hsl(30,18%,22%)"/>
    <!-- Main branches -->
    <path d="M-4,30 L-18,15 L-15,18 L-4,28 Z" fill="hsl(30,18%,22%)" opacity="0.7"/>
    <path d="M4,25 L20,12 L17,16 L4,24 Z" fill="hsl(30,18%,22%)" opacity="0.7"/>
    <!-- Canopy - layered rounded shapes for a full deciduous look -->
    <ellipse cx="0" cy="-5" rx="32" ry="28" fill="hsl(131,25%,29%)"/>
    <ellipse cx="-18" cy="2" rx="20" ry="18" fill="hsl(119,24%,34%)"/>
    <ellipse cx="18" cy="0" rx="19" ry="17" fill="hsl(119,24%,34%)"/>
    <ellipse cx="-8" cy="-18" rx="18" ry="16" fill="hsl(131,28%,32%)"/>
    <ellipse cx="10" cy="-16" rx="16" ry="15" fill="hsl(131,28%,32%)"/>
    <ellipse cx="0" cy="-28" rx="14" ry="12" fill="hsl(119,26%,36%)"/>
  </g>
</svg>